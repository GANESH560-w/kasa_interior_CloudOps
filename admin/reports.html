<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Kasa Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="admin.js" defer></script>
</head>
<body data-admin-page="reports">
    <div class="admin-shell">
        <aside class="admin-sidebar" data-admin-sidebar></aside>
        <main class="admin-main">
            <div class="admin-topbar"><h1 class="title">Reports</h1><button class="btn alt" data-logout>Logout</button></div>
            <div class="toolbar">
                <select id="reportRange"><option>This Month</option><option>Last 3 Months</option><option>This Year</option><option>Custom</option></select>
                <input id="reportStartDate" type="date" aria-label="Report start date">
                <input id="reportEndDate" type="date" aria-label="Report end date">
                <button class="btn alt" onclick="window.print()">Print / Export Report</button>
            </div>
            <section class="panel"><h2 class="panel-title">Monthly Revenue</h2><canvas id="revenueChart" height="120"></canvas></section>
            <section class="panel"><h2 class="panel-title">Expense Breakdown</h2><canvas id="expenseChart" height="120"></canvas></section>
            <section class="panel"><h2 class="panel-title">Project Status Distribution</h2><canvas id="statusChart" height="120"></canvas></section>
            <section class="panel"><h2 class="panel-title">Enquiry Trends</h2><canvas id="enquiryTrendChart" height="120"></canvas></section>
        </main>
    </div>
    <div class="toast-wrap" id="toastWrap"></div>
</body>
</html>
