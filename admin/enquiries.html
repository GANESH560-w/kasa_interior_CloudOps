<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiries | Kasa Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
    <script src="admin.js" defer></script>
</head>
<body data-admin-page="enquiries">
    <div class="admin-shell">
        <aside class="admin-sidebar" data-admin-sidebar></aside>
        <main class="admin-main">
            <div class="admin-topbar"><h1 class="title">Enquiries</h1><button class="btn alt" data-logout>Logout</button></div>
            <div class="toolbar">
                <input id="enquirySearch" placeholder="Search name, email or date">
                <button class="btn alt" id="exportEnquiries">Export CSV</button>
            </div>
            <section class="panel">
                <div class="table-wrap"><table id="enquiriesTable"></table></div>
                <div class="pagination" id="enquiriesPagination"></div>
            </section>
        </main>
    </div>
    <div class="toast-wrap" id="toastWrap"></div>
</body>
</html>
